<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Máscara circular com margem interna (r=37) -->
    <!-- Ela agora atua como a única fronteira que molda as extremidades das letras -->
    <clipPath id="innerCircle">
      <circle cx="50" cy="50" r="37" />
    </clipPath>
  </defs>

  <!-- Círculo Externo -->
  <circle cx="50" cy="50" r="45" stroke="#2563eb" stroke-width="6" fill="none" />
  
  <g clip-path="url(#innerCircle)">
    <!-- Skew de -18 deg e translação para centralizar perfeitamente o gap no x=50 -->
    <g transform="translate(16.25, 0) skewX(-18)">
      
      <!-- Linha divisória fina, acompanhando o dinamismo -->
      <line x1="50" y1="-20" x2="50" y2="120" stroke="#2563eb" stroke-width="2" opacity="0.4" />

      <!-- ================= A (Esquerda) ================= -->
      <!-- Perna direita (reta/centro) -->
      <polygon points="30,-20 46,-20 46,120 30,120" fill="#2563eb" />
      
      <!-- Perna esquerda (Ancoragem estendida até -50) -->
      <!-- Ao esticar a borda externa até -50, garantimos que ela preencha 100% do arco esquerdo -->
      <polygon points="-50,-20 30,-20 -2,120 -50,120" fill="#2563eb" />
      
      <!-- Traço do meio (embutido na perna esquerda) -->
      <polygon points="0,55 30,55 30,73 0,73" fill="#2563eb" />


      <!-- ================= N (Direita) ================= -->
      <!-- Perna esquerda (reta/centro) -->
      <polygon points="54,-20 70,-20 70,120 54,120" fill="#2563eb" />
      
      <!-- Perna direita (Ancoragem estendida até 150) -->
      <!-- Ao esticar a borda externa até 150, garantimos que ela preencha 100% do arco direito -->
      <polygon points="94,-20 150,-20 150,120 94,120" fill="#2563eb" />
      
      <!-- Diagonal maciça de conexão -->
      <polygon points="54,-20 70,-20 110,120 94,120" fill="#2563eb" />

    </g>
  </g>
</svg>
